<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CODEXNITIN</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    scroll-behavior:smooth;
}

body{
    background:#000;
    color:#00ff88;
    font-family:monospace;
    overflow-x:hidden;
}

/* MATRIX BACKGROUND */
canvas{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-1;
    opacity:0.15;
}

/* POPUP */
#popup{
    position:fixed;
    inset:0;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.popup-box{
    border:1px solid #00ff88;
    padding:35px;
    text-align:center;
    background:#050505;
    width:90%;
    max-width:420px;
    box-shadow:0 0 20px #00ff88;
}

.popup-box h2{
    margin-bottom:15px;
    font-size:28px;
}

.popup-box p{
    margin-bottom:25px;
    color:#00ffaa;
}

.popup-box button{
    background:black;
    color:#00ff88;
    border:1px solid #00ff88;
    padding:12px 30px;
    cursor:pointer;
    transition:0.3s;
    font-size:16px;
}

.popup-box button:hover{
    background:#00ff88;
    color:black;
    box-shadow:0 0 20px #00ff88;
}

/* NAVBAR */
.navbar{
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 7%;
    background:rgba(0,0,0,0.85);
    border-bottom:1px solid #00ff88;
    backdrop-filter:blur(8px);
    z-index:1000;
}

.logo{
    display:flex;
    align-items:center;
    gap:12px;
}

.logo img{
    width:48px;
    height:48px;
    border-radius:50%;
    object-fit:cover;
    border:1px solid #00ff88;
}

.logo h1{
    color:#00ff88;
    font-size:24px;
}

.nav-links{
    display:flex;
    gap:30px;
}

.nav-links a{
    color:#00ff88;
    text-decoration:none;
    font-size:16px;
    transition:0.3s;
}

.nav-links a:hover{
    text-shadow:0 0 15px #00ff88;
}

/* HERO */
.hero{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:120px 20px 50px;
}

.hero-content h2{
    font-size:70px;
    color:#00ff88;
    text-shadow:0 0 15px #00ff88;
}

.hero-content h3{
    margin-top:15px;
    color:#88ffcc;
    font-size:22px;
}

.typing{
    margin-top:30px;
    font-size:18px;
    line-height:2;
    color:#00ffaa;
    min-height:100px;
}

/* SECTIONS */
.section{
    padding:120px 10%;
}

.section-title{
    font-size:40px;
    margin-bottom:50px;
    border-bottom:1px solid #00ff88;
    padding-bottom:15px;
    text-shadow:0 0 10px #00ff88;
}

/* OSINT */
.osint-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:25px;
}

.card{
    border:1px solid #00ff88;
    padding:30px;
    background:#050505;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-8px);
    box-shadow:0 0 25px #00ff88;
}

.card i{
    font-size:35px;
    margin-bottom:20px;
}

.card h3{
    margin-bottom:12px;
}

/* ABOUT */
.about-box{
    border:1px solid #00ff88;
    padding:35px;
    line-height:2.3;
    background:#050505;
    box-shadow:0 0 20px rgba(0,255,136,0.15);
}

.about-box span{
    color:#88ffcc;
}

/* CONTACT */
.contact-links{
    display:flex;
    flex-wrap:wrap;
    gap:25px;
}

.contact-links a{
    border:1px solid #00ff88;
    padding:18px 30px;
    color:#00ff88;
    text-decoration:none;
    display:flex;
    align-items:center;
    gap:12px;
    transition:0.3s;
    background:#050505;
}

.contact-links a:hover{
    background:#00ff88;
    color:black;
    box-shadow:0 0 20px #00ff88;
}

.tool-btn{
    margin-top:20px;
    padding:12px 28px;
    background:black;
    color:#00ff88;
    border:1px solid #00ff88;
    cursor:pointer;
    transition:0.3s;
}

.tool-btn:hover{
    background:#00ff88;
    color:black;
    box-shadow:0 0 20px #00ff88;
}

.contact-links i{
    font-size:22px;
}

/* FOOTER */
footer{
    text-align:center;
    padding:35px;
    border-top:1px solid #00ff88;
    margin-top:80px;
    color:#88ffcc;
}

/* MOBILE */
@media(max-width:768px){

.hero-content h2{
    font-size:42px;
}

.hero-content h3{
    font-size:18px;
}

.navbar{
    padding:15px 5%;
}

.logo h1{
    font-size:18px;
}

.nav-links{
    gap:15px;
}

.nav-links a{
    font-size:13px;
}

.section-title{
    font-size:28px;
}

.typing{
    font-size:15px;
}

}
</style>
</head>

<body>

<!-- MATRIX -->
<canvas id="matrix"></canvas>

<!-- POPUP -->
<div id="popup">
    <div class="popup-box">
        <h2>> Welcome to CodexNitin 💻</h2>
        <p>> Access Granted...</p>
        <button onclick="enterSite()">ENTER</button>
    </div>
</div>

<!-- NAVBAR -->
<nav class="navbar">

<div class="logo">
<img src="logo.png" alt="logo">
<h1>CODEXNITIN</h1>
</div>

<div class="nav-links">
<a href="osint.html">OSINT</a>
<a href="about.html">About Me</a>
<a href="contact.html">Contact</a>
</div>

</nav>

<!-- HERO -->
<section class="hero">
<div class="hero-content">

<h2>CODEXNITIN</h2>
<h3>Developer • Learner • Explorer</h3>

<div class="typing" id="typing"></div>

</div>
</section>

<!-- FOOTER -->
<footer>
© CODEXNITIN — All Rights Reserved
</footer>

<script>

// POPUP
function enterSite(){
    document.getElementById('popup').style.display='none';
}

// TYPING EFFECT
const text = `> Accessing CodexNitin...\n> Identity Verified\n> System Online`;

let i = 0;

function typing(){
    if(i < text.length){
        document.getElementById('typing').innerHTML += text.charAt(i);
        i++;
        setTimeout(typing,35);
    }
}

typing();

// OSINT TOOL SWITCH
function showTool(){

const value = document.getElementById('toolSelect').value;

const tools = ['numberTool','vehicleTool'];

tools.forEach(tool => {
    document.getElementById(tool).style.display='none';
});

if(value === 'number'){
    document.getElementById('numberTool').style.display='block';
}

if(value === 'vehicle'){
    document.getElementById('vehicleTool').style.display='block';
}


}

// NUMBER API
async function searchNumber(){

const number = document.getElementById('numberInput').value;
const resultBox = document.getElementById('numberResult');

resultBox.innerHTML = 'Searching...';

try{

const response = await fetch(`https://toxic-num-info.vercel.app/?number=${number}`);
const data = await response.text();

resultBox.innerHTML = data;

}catch(error){
resultBox.innerHTML = 'API Error';
}
}

// VEHICLE API
async function searchVehicle(){

const vehicle = document.getElementById('vehicleInput').value;
const resultBox = document.getElementById('vehicleResult');

resultBox.innerHTML = 'Searching...';

try{

const response = await fetch(`https://devil-api.elementfx.com/api/get-info.php?key=KING-3SIHBV&vechile=${vehicle}`);
const data = await response.text();

resultBox.innerHTML = data;

}catch(error){
resultBox.innerHTML = 'API Error';
}
}

// MATRIX EFFECT
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

const letters = '01ABCDEFGHIJKLMNOPQRSTUVWXYZ';
const array = letters.split('');

const fontSize = 14;
const columns = canvas.width / fontSize;

const drops = [];

for(let x = 0; x < columns; x++){
    drops[x] = 1;
}

function draw(){

ctx.fillStyle = 'rgba(0,0,0,0.05)';
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle = '#00ff88';
ctx.font = fontSize + 'px monospace';

for(let i = 0; i < drops.length; i++){

const text = array[Math.floor(Math.random()*array.length)];

ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize > canvas.height && Math.random() > 0.975){
    drops[i] = 0;
}

drops[i]++;

}
}

setInterval(draw,35);

</script>

</body>
</html>
